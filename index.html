<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Gym Tracker</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gym" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Theme color (barra del navegador) -->
    <meta name="theme-color" content="#080810" />

    <!-- Android: ocultar barra del navegador al instalar como PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Gym" />

    <!-- Forzar pantalla completa en Android Chrome -->
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#080810" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
